<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Pedidos</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('root');
        el.style.cssText = 'padding:20px;font-family:monospace;background:#fee;color:#c00;white-space:pre-wrap';
        el.textContent = 'JS ERROR: ' + e.message + '\nFile: ' + e.filename + ':' + e.lineno;
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('root');
        el.style.cssText = 'padding:20px;font-family:monospace;background:#fee;color:#c00;white-space:pre-wrap';
        el.textContent = 'PROMISE ERROR: ' + (e.reason && (e.reason.message || e.reason));
      });
    </script>
  </body>
</html>
