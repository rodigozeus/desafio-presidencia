name: CI - Frontend

on:
  push:
    paths:
      - "frontend/**"
  pull_request:
    paths:
      - "frontend/**"

jobs:
  build-shell:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/shell
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/shell/package.json
      - run: npm install
      - run: npm run build

  build-mfe-orders:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mfe-orders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/mfe-orders/package.json
      - run: npm install
      - run: npm run build
